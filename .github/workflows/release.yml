name: Build & Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (patch, minor, major, or none)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version & Create Git Tag
        id: version_bump
        run: |
          if [ "${{ github.event.inputs.version_type }}" != "" ] && [ "${{ github.event.inputs.version_type }}" != "none" ]; then
            # Bump package version and create git tag
            npm version ${{ github.event.inputs.version_type }} -m "release: v%s"
            git push origin main
            git push origin --tags
            
            # Determine the tag that was created
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./package.json')).version)")
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Fallback: get current version from package.json and ensure tag exists on remote
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./package.json')).version)")
            TAG="v$VERSION"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            
            # Check if tag exists on remote, if not, create and push it
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
              git push origin "$TAG"
            fi
          fi

      - name: Build standalone binaries
        run: npm run build

      - name: Create release archives
        run: |
          # Package Windows zip (including adb.exe and required DLLs)
          zip -j saca-windows-x64.zip dist/saca-win.exe adb.exe AdbWinApi.dll AdbWinUsbApi.dll
          
          # Package macOS tarball
          tar -czvf saca-macos-x64.tar.gz -C dist saca-macos
          
          # Package Linux tarball
          tar -czvf saca-linux-x64.tar.gz -C dist saca-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.tag }}
          files: |
            saca-windows-x64.zip
            saca-macos-x64.tar.gz
            saca-linux-x64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
