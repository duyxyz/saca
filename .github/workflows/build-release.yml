name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # Cấp quyền để tạo GitHub Release
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon="app_icon.ico" "adb_uninstaller.py"

      - name: Prepare Release Archive
        run: |
          copy adb.exe dist\adb_uninstaller\
          copy AdbWinApi.dll dist\adb_uninstaller\
          copy AdbWinUsbApi.dll dist\adb_uninstaller\
          copy fastboot.exe dist\adb_uninstaller\
          copy app_icon.ico dist\adb_uninstaller\
          copy README.md dist\adb_uninstaller\
          copy LICENSE dist\adb_uninstaller\
          Compress-Archive -Path dist\adb_uninstaller -DestinationPath ADB-App-Remover-Windows.zip

      - name: Generate Dynamic Tag
        id: generate_tag
        run: echo "TAG_NAME=v1.0.${{ github.run_number }}" >> $env:GITHUB_ENV

      - name: Upload Artifact (For checking)
        uses: actions/upload-artifact@v4
        with:
          name: ADB-App-Remover-Zip
          path: ADB-App-Remover-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          files: ADB-App-Remover-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
