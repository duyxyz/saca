name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --console --icon="app_icon.ico" --name "ADB-App-Remover" adb_uninstaller.py

      - name: Prepare Release Archive
        run: |
          mkdir release
          copy dist\ADB-App-Remover.exe release\
          copy adb.exe release\
          copy AdbWinApi.dll release\
          copy AdbWinUsbApi.dll release\
          copy fastboot.exe release\
          copy app_icon.ico release\
          copy README.md release\
          copy LICENSE release\
          Compress-Archive -Path release\* -DestinationPath ADB-App-Remover-Windows.zip

      - name: Generate Dynamic Tag
        id: generate_tag
        run: echo "TAG_NAME=v1.0.${{ github.run_number }}" >> $env:GITHUB_ENV

      - name: Upload Artifact (For checking)
        uses: actions/upload-artifact@v4
        with:
          name: ADB-App-Remover-Zip
          path: ADB-App-Remover-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            ## ADB App Remover ${{ env.TAG_NAME }}
            
            ### Cách dùng
            1. Tải file `ADB-App-Remover-Windows.zip` về và giải nén
            2. Đảm bảo đã cài ADB và thêm vào PATH
            3. Kết nối điện thoại Android qua USB và bật USB Debugging
            4. Chạy `ADB-App-Remover.exe`
          files: ADB-App-Remover-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
